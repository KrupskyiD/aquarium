name: Deploy Node Application 

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Login to docker hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Docker Image for Backend
        run: |
          cd server
          docker build -t ${{ secrets.DOCKER_USERNAME }}/aquarium-server:latest .
      - name: Publish Image to docker hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/aquarium-server:latest
      - name: Build Client Image
        run: |
          cd client
          docker build -t ${{ secrets.DOCKER_USERNAME }}/aquarium-client:latest \
            --build-arg VITE_BACKEND_URL='${{ secrets.VITE_BACKEND_URL }}' \
            --build-arg VITE_API_URL='${{ secrets.VITE_API_URL }}' .
      - name: Push Client to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/aquarium-client:latest

      - name: Stoping containers
        run: |
          docker rm -f aquarium-server || true
          docker rm -f aquarium-client || true

      - name: Start Prisma migrating
        run: |
          docker run --rm \
            -e NODE_OPTIONS="--max-old-space-size=512" \
            -e DATABASE_URL='${{ secrets.DATABASE_URL }}' \
            ${{ secrets.DOCKER_USERNAME }}/aquarium-server:latest \
            npx prisma migrate deploy

      - name: Start Server container
        run: |
          docker run -d -p 3001:3001 --name aquarium-server \
            -e PORT=3001 \
            -e NODE_ENV='${{ secrets.NODE_ENV }}' \
            -e APP_URL='${{ secrets.APP_URL }}' \
            -e DATABASE_URL='${{ secrets.DATABASE_URL }}' \
            -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            -e JWT_REFRESH_SECRET='${{ secrets.JWT_REFRESH_SECRET }}' \
            -e MAIL_HOST='${{ secrets.MAIL_HOST }}' \
            -e MAIL_PORT='${{ secrets.MAIL_PORT }}' \
            -e MAIL_USER='${{ secrets.MAIL_USER }}' \
            -e MAIL_PASS='${{ secrets.MAIL_PASS }}' \
            -e TEST_EMAIL='${{ secrets.TEST_EMAIL }}' \
            ${{ secrets.DOCKER_USERNAME }}/aquarium-server:latest

      - name: starting client container
        run: |
          docker run -d -p 80:80 --name aquarium-client \
            ${{ secrets.DOCKER_USERNAME }}/aquarium-client:latest
      